/* useReveal */
function useReveal(ref,t=0.12){
  const[v,setV]=useState(false);
  useEffect(()=>{
    if(!ref.current)return;
    const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setV(true)},{threshold:t});
    o.observe(ref.current);return()=>o.disconnect();
  },[]);
  return v;
}

function ContactForm(){

  const phoneRe=/^[\d\s()\-+.]{7,20}$/;
  const validate=()=>{
    const e={};
    if(!nameRe.test(f.first.trim()))e.first='Enter a valid first name (letters only, 2+ chars)';
    if(!nameRe.test(f.last.trim()))e.last='Enter a valid last name (letters only, 2+ chars)';
    if(!emailRe.test(f.email.trim()))e.email='Enter a valid email address';
    if(!phoneRe.test(f.phone.trim()))e.phone='Enter a valid phone number';
    if(f.icecream.trim().length<2)e.icecream='This one\'s required. We\'re very serious about ice cream 🍦';
    if(f.message.trim().length<15)e.message='Tell us a bit more about your setup goals (15+ chars)';
    return e;
  };
  const submit=async ev=>{
    ev.preventDefault();
    const e=validate();
    if(Object.keys(e).length){setErr(e);return;}
    setLoading(true);
    await new Promise(r=>setTimeout(r,1400));
    setLoading(false);setDone(true);
  };
  const inp=(key,label,type='text',ph='',multi=false)=>{
    const e=err[key];

              :<input style={base} type={type} placeholder={ph} value={f[key]} onChange={ev=>setF(p=>({...p,[key]:ev.target.value}))} onFocus={()=>setErr(p=>({...p,[key]:undefined}))}/>}
        {e&&<span style={{color:'#f87171',fontSize:'0.7rem'}}>{e}</span>}
      </div>
    );
  };
  if(done)return(
    <div style={{textAlign:'center',padding:'3rem 1rem'}}>
      <div style={{fontSize:'3.5rem',marginBottom:'1rem'}}>🎬</div>
      <h3 style={{color:SAND,fontWeight:900,fontSize:'1.7rem',marginBottom:'0.75rem'}}>You're In The Edit Bay.</h3>

      <div style={{display:'flex',flexDirection:'column',gap:'10px',marginBottom:'1.5rem'}}>
        <a href="mailto:subs@thedigitalbutler.io" style={{color:TEAL,fontWeight:700,fontSize:'1rem',textDecoration:'none'}}>📧 subs@thedigitalbutler.io</a>
        <a href="tel:9195949649" style={{color:TEAL,fontWeight:700,fontSize:'1rem',textDecoration:'none'}}>📞 (919) 594-9649</a>
      </div>
      <p style={{color:'rgba(245,245,220,0.35)',fontSize:'0.78rem'}}>Response within 24 hours. No bots. Just gear talk and good vibes.</p>
    </div>
  );
  return(
    <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:'1.1rem'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>{inp('first','First Name','text','Gordon')}{inp('last','Last Name','text','Ramsey')}</div>
      {inp('email','Email Address','email','you@studio.io')}

      <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
        <label style={{color:SAND,fontSize:'0.75rem',fontWeight:700,letterSpacing:'0.06em'}}>🍦 Most Critical Question on This Page</label>
        <p style={{color:SIL,fontSize:'0.7rem',marginBottom:'4px'}}>What's your go-to ice cream flavor when you finally nail that impossible edit? (Required. This is extremely serious business.)</p>
        <input style={{width:'100%',padding:'13px 16px',background:'rgba(255,255,255,0.06)',border:`1.5px solid ${err.icecream?'#ef4444':SAND+'44'}`,borderRadius:'10px',color:BEIGE,fontSize:'0.9rem',fontFamily:'inherit'}} type="text" placeholder="e.g. Brown Butter Bourbon Pecan (wrong answers encouraged)" value={f.icecream} onChange={ev=>setF(p=>({...p,icecream:ev.target.value}))} onFocus={()=>setErr(p=>({...p,icecream:undefined}))}/>
        {err.icecream&&<span style={{color:'#f87171',fontSize:'0.7rem'}}>{err.icecream}</span>}
      </div>
      {inp('message','Tell Us About Your Creative Setup & Goals','text','I need three screens minimum. My current setup is embarrassing and my clients deserve better.',true)}
      <div style={{background:'rgba(238,150,75,0.07)',border:`1px solid rgba(238,150,75,0.18)`,borderRadius:'10px',padding:'1rem 1.25rem',fontSize:'0.78rem',color:'rgba(245,245,220,0.5)',lineHeight:1.75}}>
        <strong style={{color:SAND}}>Serious buyers only, please.</strong> This suite spent years creating content for global brands and broadcast television. It deserves a next chapter as serious as its first.<br/>
        <strong style={{color:TEAL}}>Local RTP pickup preferred — $50 off for pickup.</strong> Remote buyers welcome; shipping and packaging costs apply and will be discussed at contact.
      </div>
      <button className="btn-p" type="submit" style={{justifyContent:'center',fontSize:'1rem',padding:'18px 24px',width:'100%'}}>

      </button>
    </form>
  );
}
