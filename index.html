<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>THE OLYMPIAN</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a0f24;font-family:Inter,ui-sans-serif,system-ui;-webkit-font-smoothing:antialiased}
.mon{transition:transform 0.6s ease,opacity 0.6s ease;display:inline-block}
.reveal{opacity:0;transform:translateY(30px);transition:opacity 0.8s ease,transform 0.8s ease}
.reveal.show{opacity:1;transform:translateY(0)}
.slash{transform-origin:left;transition:transform 0.7s ease;position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.slash.hide{transform:scaleX(0)}
.slash.show{transform:scaleX(1)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

function useReveal(ref,t=0.2){
  const[v,setV]=useState(false);
  useEffect(()=>{
    if(!ref.current)return;
    const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setV(true)},{threshold:t});
    o.observe(ref.current);
    return()=>o.disconnect();
  },[]);
  return v;
}

const Check=()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#3ACDAD" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
const Zap=()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z" fill="#1a0f24"/></svg>;
const Close=()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="#F5F5DC" strokeWidth="2.5" strokeLinecap="round"/></svg>;
const Info=()=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#007B97" strokeWidth="1.5"/><path d="M12 8v1M12 11v5" stroke="#007B97" strokeWidth="2" strokeLinecap="round"/></svg>;

function Scr({w,h,label}){
  return(
    <svg width={w} height={h} viewBox="0 0 200 130" fill="none">
      <rect x="4" y="4" width="192" height="112" rx="8" fill="#1e293b"/>
      <rect x="14" y="12" width="172" height="84" rx="4" fill="#0f172a"/>
      <text x="100" y="58" textAnchor="middle" fill="#475569" fontSize="13" fontFamily="ui-sans-serif">{label}</text>
      <rect x="80" y="118" width="40" height="6" rx="3" fill="#334155"/>
      <rect x="70" y="124" width="60" height="4" rx="2" fill="#475569"/>
    </svg>
  );
}

function Modal({open,onClose,d}){
  if(!open)return null;
  return(
    <div style={{position:'fixed',inset:0,zIndex:999,display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem',background:'rgba(26,15,36,0.85)',backdropFilter:'blur(8px)'}}>
      <div style={{background:'#F5F5DC',borderRadius:'1.25rem',padding:'2rem',maxWidth:'480px',width:'100%',position:'relative',border:'1px solid #BDC3C7',boxShadow:'0 30px 60px rgba(0,0,0,0.5)'}}>
        <button onClick={onClose} style={{position:'absolute',top:'1rem',right:'1rem',background:'#1a0f24',border:'none',borderRadius:'8px',padding:'6px 8px',cursor:'pointer',display:'flex',alignItems:'center'}}><Close/></button>
        <div style={{color:'#EE964B',fontSize:'0.6rem',fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:'6px'}}>{d.badge}</div>
        <h3 style={{color:'#1a0f24',fontWeight:900,fontSize:'1.4rem',marginBottom:'1rem'}}>{d.title}</h3>
        <div style={{color:'#007B97',fontSize:'0.6rem',fontWeight:700,letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:'6px'}}>What It Means</div>
        <p style={{color:'#475569',fontSize:'0.875rem',lineHeight:1.75,marginBottom:'1rem'}}>{d.education}</p>
        <blockquote style={{borderLeft:'4px solid #EE964B',paddingLeft:'1rem',fontStyle:'italic',color:'#64748b',fontSize:'0.875rem',marginBottom:'1rem'}}>"{d.quote}"</blockquote>
        <div style={{color:'#007B97',fontSize:'0.6rem',fontWeight:700,letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:'6px'}}>Pro Impact</div>
        <p style={{color:'#475569',fontSize:'0.875rem',lineHeight:1.75}}>{d.proImpact}</p>
      </div>
    </div>
  );
}

function App(){
  const specs=[
    {id:'ppi',title:'186 PPI',badge:'DISPLAY PRECISION',tagline:'Pin-sharp clarity at every pixel',
     education:'186 pixels per inch delivers exceptional sharpness on a 24 inch panel. Text is crisp, icons are razor-defined, and fine detail is fully resolved without upscaling.',
     quote:'At 186 PPI the screen disappears — you only see the work.',
     proImpact:'Designers gain pixel-perfect fidelity. Analysts read dense data without zoom fatigue. Writers enjoy book-quality text rendering all day.'},
    {id:'sync',title:'Native Sync',badge:'ZERO LATENCY',tagline:'Hardware-level display handshake',
     education:'Native Sync means the display talks directly to your GPU at the hardware level. No drivers, no adapters, no lag. Plug in and it works instantly every time.',
     quote:'The monitor knows your system. Your system knows the monitor.',
     proImpact:'Eliminates stutter, color profile mismatches, and refresh drift. Critical for video editors, 3D artists, and color-critical workflows.'},
    {id:'tb',title:'TB Chain',badge:'ONE CABLE',tagline:'One cable powers a three-screen empire',
     education:'Thunderbolt Daisy Chain lets you connect a second and third monitor directly to the first. No extra hub — one cable from laptop, full triple output.',
     quote:'Clean desk. Clear mind. One cable.',
     proImpact:'Saves 2 or more ports. Eliminates dock clutter. Build a full triple-monitor workstation and still have ports left for drives and peripherals.'}
  ];

  const values=[
    {name:'32" LG UltraFine',type:'Primary Display',msrp:'$699',ours:'Included',specs:['186 PPI · Retina-class','400 nits brightness','Thunderbolt 3']},
    {name:'24" Dell UltraSharp',type:'Side Display x2',msrp:'$329',ours:'Included',specs:['110 PPI · IPS panel','300 nits brightness','Native Sync ready']},
    {name:'TB3 Dock + Cables',type:'I/O Bundle',msrp:'$249',ours:'Included',specs:['Daisy-chain ready','85W host charging','USB-A + USB-C']},
    {name:'Full Bundle',type:'Your Price',msrp:'$1,630+',ours:'$1,150',specs:['Save over $480','All items included','Ships complete']}
  ];

  const[open,setOpen]=useState(false);
  const[active,setActive]=useState(specs[0]);
  const[stage,setStage]=useState(0);

  const r1=useRef(null),r2=useRef(null),r3=useRef(null);
  const heroR=useRef(null),specR=useRef(null),valR=useRef(null),finR=useRef(null);

  const heroV=useReveal(heroR,0.05);
  const specV=useReveal(specR,0.1);
  const valV=useReveal(valR,0.15);
  const finV=useReveal(finR,0.1);

  useEffect(()=>{
    const mk=(el,n)=>{
      if(!el)return null;
      const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setStage(n)},{threshold:0.4});
      o.observe(el);return o;
    };
    const o1=mk(r1.current,0),o2=mk(r2.current,1),o3=mk(r3.current,2);
    return()=>{o1&&o1.disconnect();o2&&o2.disconnect();o3&&o3.disconnect()};
  },[]);

  const stageNames=['Daisy Chain','Triple Threat','Social Pivot'];
  const stageDesc=[
    'One TB cable from your laptop powers the 32" center display. Zero clutter.',
    'Two 24" panels flank the 32" centerpiece. Side monitors fade, center takes focus.',
    'Right monitor rotates vertical — built for social feeds and portrait content.'
  ];

  const BG='#1a0f24';
  const SANDY='#EE964B';
  const TEAL='#3ACDAD';
  const CERULEAN='#007B97';
  const BEIGE='#F5F5DC';
  const SILVER='#BDC3C7';

  const lS={opacity:stage===0?0:0.28,transform:stage===0?'scale(0) translateX(-20px)':`scale(${stage>=1?0.82:1})`};
  const cS={transform:`scale(${stage>=1?1.12:1})`};
  const rS={opacity:stage===0?0:0.28,transform:stage===0?'scale(0) translateX(20px)':`scale(${stage>=1?0.82:1}) rotate(${stage>=2?90:0}deg)`};

  const card={background:'#fff',borderRadius:'20px',border:`1px solid ${SILVER}`,padding:'1.5rem',cursor:'pointer',textAlign:'left',boxShadow:'0 2px 12px rgba(0,0,0,0.06)',transition:'all 0.3s',width:'100%'};
  const tag={display:'inline-block',padding:'2px 8px',background:'rgba(238,150,75,0.15)',color:SANDY,fontSize:'0.6rem',fontWeight:700,fontFamily:'monospace',borderRadius:'4px',marginBottom:'8px'};
  const miniLabel={color:CERULEAN,fontSize:'0.6rem',fontWeight:700,letterSpacing:'0.15em',textTransform:'uppercase',marginBottom:'6px'};

  return(
    <div style={{width:'100%',overflowX:'hidden'}}>

      {/* HERO */}
      <section style={{background:`linear-gradient(140deg, ${BG} 0%, #110a1a 100%)`,minHeight:'100vh',display:'flex',alignItems:'center',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:'-15%',right:'-10%',width:'600px',height:'600px',borderRadius:'50%',background:'radial-gradient(circle,rgba(0,123,151,0.1),transparent)',pointerEvents:'none'}}/>
        <div style={{position:'absolute',bottom:'-10%',left:'-5%',width:'400px',height:'400px',borderRadius:'50%',background:'radial-gradient(circle,rgba(238,150,75,0.07),transparent)',pointerEvents:'none'}}/>
        <div ref={heroR} className={`reveal ${heroV?'show':''}`}
          style={{maxWidth:'1100px',margin:'0 auto',padding:'5rem 1.5rem',width:'100%',display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'4rem',alignItems:'center'}}>

          <div style={{display:'flex',flexDirection:'column',gap:'1.5rem'}}>
            <div style={{display:'inline-flex',alignItems:'center',gap:'8px',padding:'6px 16px',borderRadius:'9999px',border:`1px solid rgba(238,150,75,0.3)`,color:SANDY,fontSize:'0.6rem',fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',width:'fit-content'}}>
              ★ Studio Exclusive
            </div>
            <div>
              <h1 style={{color:BEIGE,fontWeight:900,lineHeight:0.95,fontSize:'clamp(2.8rem,6.5vw,5rem)',margin:0,letterSpacing:'-0.02em'}}>
                THE<br/><span style={{color:SANDY}}>OLYMPIAN</span>
              </h1>
              <div style={{color:SILVER,fontWeight:300,letterSpacing:'0.4em',fontSize:'clamp(0.7rem,1.3vw,0.85rem)',marginTop:'0.6rem',textTransform:'uppercase'}}>Creative Suite</div>
            </div>
            <p style={{color:'rgba(245,245,220,0.6)',fontSize:'1rem',lineHeight:1.8,maxWidth:'400px',margin:0}}>
              A precision-curated hardware stack for creators who demand professional-grade performance — without the professional-grade price tag.
            </p>
            <div style={{display:'flex',gap:'1rem',alignItems:'center',flexWrap:'wrap'}}>
              <a href="#final" style={{display:'inline-flex',alignItems:'center',gap:'8px',background:SANDY,color:BG,padding:'14px 30px',borderRadius:'12px',fontWeight:900,fontSize:'0.875rem',textDecoration:'none',boxShadow:`0 8px 28px rgba(238,150,75,0.4)`,transition:'transform 0.2s'}}>
                Adopt the Legacy <Zap/>
              </a>
              <span style={{color:'rgba(245,245,220,0.35)',fontSize:'0.8rem'}}>Limited stock · Ships fast</span>
            </div>
            <div style={{display:'flex',gap:'2.5rem',paddingTop:'0.5rem'}}>
              {[['75%','Below MSRP'],['2 yr','Warranty'],['3x','Displays']].map(([v,l])=>(
                <div key={l} style={{textAlign:'center'}}>
                  <div style={{color:SANDY,fontWeight:900,fontSize:'clamp(1.5rem,3vw,2.2rem)',lineHeight:1}}>{v}</div>
                  <div style={{color:'rgba(245,245,220,0.3)',fontSize:'0.6rem',marginTop:'4px',textTransform:'uppercase',letterSpacing:'0.12em'}}>{l}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{position:'relative',display:'flex',justifyContent:'center'}}>
            <div style={{position:'relative',width:'100%',maxWidth:'420px'}}>
              <img
                src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=900&q=80"
                alt="Workstation"
                style={{width:'100%',borderRadius:'20px',boxShadow:'0 30px 70px rgba(0,0,0,0.6)',objectFit:'cover',maxHeight:'420px',display:'block'}}
              />
              <div style={{position:'absolute',top:'-16px',right:'-16px',width:'90px',height:'90px',background:SANDY,borderRadius:'50%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',boxShadow:`0 8px 28px rgba(238,150,75,0.5)`,border:`4px solid ${BG}`}}>
                <div style={{color:BG,fontWeight:900,fontSize:'1.6rem',lineHeight:1}}>75%</div>
                <div style={{color:BG,fontWeight:900,fontSize:'0.55rem',letterSpacing:'0.05em'}}>SAVINGS</div>
              </div>
              <div style={{position:'absolute',bottom:'-30px',left:'-16px',background:'rgba(245,245,220,0.98)',borderRadius:'16px',padding:'16px 20px',boxShadow:'0 20px 48px rgba(0,0,0,0.35)',border:`1px solid ${SILVER}`,width:'220px'}}>
                <div style={{color:'#94a3b8',fontSize:'0.6rem',textTransform:'uppercase',letterSpacing:'0.12em',marginBottom:'8px'}}>Full Bundle</div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
                  <div>
                    <div style={{color:BG,fontWeight:900,fontSize:'1.7rem',lineHeight:1}}>$1,150</div>
                    <div style={{color:'#94a3b8',fontSize:'0.75rem',textDecoration:'line-through',marginTop:'4px'}}>$1,630+ MSRP</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{color:TEAL,fontWeight:700,fontSize:'0.75rem'}}>Core i7</div>
                    <div style={{color:'#94a3b8',fontSize:'0.7rem'}}>32GB NVMe</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* SPEC DECODER */}
      <section ref={specR} style={{background:BEIGE,padding:'7rem 1.5rem'}}>
        <div className={`reveal ${specV?'show':''}`} style={{maxWidth:'1100px',margin:'0 auto'}}>
          <div style={{marginBottom:'3.5rem'}}>
            <div style={miniLabel}>Deep Dive</div>
            <h2 style={{color:BG,fontWeight:900,fontSize:'clamp(2rem,4vw,3rem)',margin:0}}>Spec-Decoder</h2>
            <p style={{color:'#64748b',marginTop:'12px',maxWidth:'480px',lineHeight:1.7}}>Every spec has a story. Tap any card to understand what it means for your workflow.</p>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:'1.5rem'}}>
            {specs.map(s=>(
              <button key={s.id} style={card} onClick={()=>{setActive(s);setOpen(true);}}>
                <div style={{display:'flex',alignItems:'flex-start',gap:'1rem'}}>
                  <div style={{padding:'10px',background:'rgba(26,15,36,0.05)',borderRadius:'12px',flexShrink:0}}><Info/></div>
                  <div>
                    <div style={tag}>{s.badge}</div>
                    <div style={{color:BG,fontWeight:900,fontSize:'1.15rem'}}>{s.title}</div>
                    <div style={{color:'#64748b',fontSize:'0.875rem',marginTop:'4px'}}>{s.tagline}</div>
                  </div>
                </div>
                <div style={{marginTop:'1rem',color:CERULEAN,fontSize:'0.75rem',fontWeight:600}}>Tap to explore →</div>
              </button>
            ))}
          </div>
        </div>
      </section>

      <Modal open={open} onClose={()=>setOpen(false)} d={active}/>

      {/* RECONFIGURATOR */}
      <section style={{background:'#fff',padding:'7rem 1.5rem'}}>
        <div style={{maxWidth:'1100px',margin:'0 auto'}}>
          <div style={{marginBottom:'3.5rem'}}>
            <div style={miniLabel}>Interactive</div>
            <h2 style={{color:BG,fontWeight:900,fontSize:'clamp(2rem,4vw,3rem)',margin:0}}>The Reconfigurator</h2>
            <p style={{color:'#64748b',marginTop:'12px',maxWidth:'480px',lineHeight:1.7}}>Scroll through the stages. Watch the setup evolve in real time.</p>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'3rem',alignItems:'start'}}>
            <div style={{position:'sticky',top:'2rem'}}>
              <div style={{background:BEIGE,borderRadius:'20px',border:`1px solid ${SILVER}`,padding:'2rem',boxShadow:'0 8px 32px rgba(0,0,0,0.08)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}}>
                  <div>
                    <div style={{color:'#94a3b8',fontSize:'0.6rem',textTransform:'uppercase',letterSpacing:'0.12em',fontWeight:600}}>Stage</div>
                    <div style={{color:BG,fontWeight:900,fontSize:'1.5rem',marginTop:'4px'}}>{stageNames[stage]}</div>
                  </div>
                  <div style={{display:'flex',gap:'8px'}}>
                    {[0,1,2].map(i=><div key={i} style={{width:'10px',height:'10px',borderRadius:'50%',background:i===stage?SANDY:SILVER,transform:i===stage?'scale(1.5)':'scale(1)',transition:'all 0.3s'}}/>)}
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'flex-end',justifyContent:'center',gap:'12px',padding:'1.5rem 0',minHeight:'130px',overflow:'hidden'}}>
                  <div className="mon" style={lS}><Scr w={100} h={65} label='24"'/></div>
                  <div className="mon" style={cS}><Scr w={165} h={107} label='32"'/></div>
                  <div className="mon" style={rS}><Scr w={100} h={65} label='24"'/></div>
                </div>
                <div style={{display:'flex',justifyContent:'center',margin:'0.75rem 0 0.5rem'}}>
                  <svg width="230" height="8" viewBox="0 0 230 8">
                    <line x1="10" y1="4" x2="220" y2="4" stroke={SILVER} strokeWidth="1.5" strokeDasharray="5 4"/>
                    <circle cx="10" cy="4" r="3.5" fill={TEAL}/>
                    <circle cx="115" cy="4" r="2.5" fill={SANDY}/>
                    <circle cx="220" cy="4" r="3.5" fill={TEAL}/>
                  </svg>
                </div>
                <p style={{textAlign:'center',color:'#64748b',fontSize:'0.8rem',lineHeight:1.7,marginTop:'0.5rem'}}>{stageDesc[stage]}</p>
              </div>
            </div>

            <div>
              {[
                {ref:r1,n:0,bg:BG,textC:BEIGE,label:'Stage 01',title:'Daisy Chain',
                 desc:'One Thunderbolt cable from your MacBook or PC powers the 32" center monitor. No hub, no splitter, no mess. Plug in and create.',check:'Single cable. Zero clutter.'},
                {ref:r2,n:1,bg:CERULEAN,textC:BEIGE,label:'Stage 02',title:'Triple Threat',
                 desc:'Chain in both 24" panels. The 32" commands center stage while side monitors handle reference material, communication, or extended timelines.',check:'Three screens. One cable run.'},
                {ref:r3,n:2,bg:SANDY,textC:BG,label:'Stage 03',title:'Social Pivot',
                 desc:'Rotate the right 24" to portrait orientation. A vertical display built for Instagram, TikTok previews, and long-form document reading.',check:'Portrait mode for social creators.'}
              ].map(({ref,bg,textC,label,title,desc,check},i)=>(
                <div key={i} ref={ref} style={{padding:'4rem 0',borderBottom:i<2?`1px solid rgba(189,195,199,0.35)`:'none'}}>
                  <div style={{display:'inline-block',padding:'4px 14px',background:bg,color:textC,fontSize:'0.6rem',fontFamily:'monospace',borderRadius:'9999px',marginBottom:'1rem',fontWeight:700}}>{label}</div>
                  <h3 style={{color:BG,fontWeight:900,fontSize:'1.6rem',marginBottom:'0.75rem'}}>{title}</h3>
                  <p style={{color:'#64748b',lineHeight:1.8,fontSize:'0.95rem'}}>{desc}</p>
                  <div style={{marginTop:'1rem',display:'flex',alignItems:'center',gap:'8px',color:TEAL,fontWeight:600,fontSize:'0.875rem'}}><Check/>{check}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>

      {/* VALUE GAP */}
      <section ref={valR} style={{background:BEIGE,padding:'7rem 1.5rem'}}>
        <div style={{maxWidth:'1100px',margin:'0 auto'}}>
          <div style={{marginBottom:'3.5rem'}}>
            <div style={miniLabel}>The Math</div>
            <h2 style={{color:BG,fontWeight:900,fontSize:'clamp(2rem,4vw,3rem)',margin:0}}>Value Gap</h2>
            <p style={{color:'#64748b',marginTop:'12px',maxWidth:'480px',lineHeight:1.7}}>Watch the market prices get crossed out. The savings are real.</p>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'1.25rem'}}>
            {values.map((item,i)=>(
              <div key={i} style={{background:'#fff',borderRadius:'20px',border:`1px solid ${SILVER}`,padding:'1.5rem',boxShadow:'0 2px 10px rgba(0,0,0,0.05)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'0.75rem'}}>
                  <div>
                    <div style={{color:BG,fontWeight:900,fontSize:'0.95rem'}}>{item.name}</div>
                    <div style={{color:'#94a3b8',fontSize:'0.7rem',marginTop:'2px'}}>{item.type}</div>
                  </div>
                  <div style={{position:'relative',display:'inline-block',minWidth:'60px',textAlign:'right'}}>
                    <div style={{color:BG,fontWeight:900,fontSize:'1.2rem'}}>{item.msrp}</div>
                    <svg className={`slash ${valV?'show':'hide'}`} style={{transitionDelay:`${i*150}ms`}} viewBox="0 0 100 32" preserveAspectRatio="none">
                      <line x1="0" y1="28" x2="100" y2="4" stroke={SANDY} strokeWidth="5" strokeLinecap="round"/>
                    </svg>
                  </div>
                </div>
                <div style={{color:TEAL,fontWeight:700,fontSize:'0.8rem',marginBottom:'0.75rem'}}>{item.ours}</div>
                <div style={{borderTop:`1px solid rgba(189,195,199,0.4)`,paddingTop:'0.75rem'}}>
                  {item.specs.map((s,j)=><div key={j} style={{color:'#64748b',fontSize:'0.75rem',lineHeight:1.9}}>{s}</div>)}
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* FINAL HOOK */}
      <section id="final" ref={finR} style={{background:`linear-gradient(140deg,${BG} 0%,#110a1a 100%)`,padding:'7rem 1.5rem',position:'relative',overflow:'hidden'}}>
